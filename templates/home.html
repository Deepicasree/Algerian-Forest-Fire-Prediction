<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algerian Forest Fire Prediction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:500px;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#2c3e50;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        h2{
            text-align:center;
            margin-top:20px;
            color:#007bff;
        }
    </style>

</head>

<body>

<div class="container">

<h1>🔥 Algerian Forest Fire Prediction</h1>

<form action="/predict" method="POST">

<input type="number" step="any" name="Temperature" placeholder="Temperature" required>

<input type="number" step="any" name="RH" placeholder="Relative Humidity (RH)" required>

<input type="number" step="any" name="Ws" placeholder="Wind Speed (Ws)" required>

<input type="number" step="any" name="Rain" placeholder="Rain" required>

<input type="number" step="any" name="FFMC" placeholder="FFMC" required>

<input type="number" step="any" name="DMC" placeholder="DMC" required>

<input type="number" step="any" name="ISI" placeholder="ISI" required>

<input type="number" step="any" name="Classes" placeholder="Classes (0 = Not Fire, 1 = Fire)" required>

<input type="number" step="any" name="Region" placeholder="Region (0 or 1)" required>

<br><br>

<button type="submit">Predict FWI</button>

</form>

<h2>{{ prediction_text }}</h2>


</div>

</body>

</html>
